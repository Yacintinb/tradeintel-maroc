name: Office des Changes scraper

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Annees a importer, separees par des virgules"
        required: true
        default: "2025"
  schedule:
    - cron: "30 3 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Scrape Office des Changes
        env:
          APP_URL: ${{ secrets.APP_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          OFFICE_CHANGES_YEARS: ${{ github.event.inputs.years || vars.OFFICE_CHANGES_YEARS || '2025' }}
        run: node scripts/scrapers/office-des-changes.mjs
      - name: Upload scraper debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: office-des-changes-scraper-output
          path: scraper-output
          if-no-files-found: ignore
